<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookie Clicker - 14_Manit(Arm/อาม)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="text/javascript" src="./js/script.js" defer></script>
    <style>
      html, body {font-family:"Mali", ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji"; font-weight:400; font-style:normal;}
    </style>
  </head>
  <body class="flex flex-col md:flex-row items-center min-h-dvh bg-slate-50 bg-[url(./images/bg-pattern.svg)] bg-repeat bg-center bg-[auto_40px]">
    <main class="flex flex-col grow justify-center items-center gap-10 md:min-h-dvh p-4 md:p-10">
      <div id="cookieCount" class="max-w-100 text-center px-10 py-4 border-4 border-teal-600 rounded-2xl bg-white">
        <p class="text-4xl -tracking-[0.1em] text-teal-700">คุกกี้ <span id="countNumber">0</span> ชิ้น</p>
      </div>
      <div id="cookieContainer" class="group relative">
        <div id="cookieContainer" class="relative z-10 group-hover:animate-bounce">
          <button id="clicker" class="cursor-pointer size-50 bg-[url(./images/cookie.svg)] bg-no-repeat bg-center bg-cover hover:scale-125 active:scale-150 text-shadow-[0_10px_30px_var(--color-red-500)] transition-all"></button>
        </div>
        <div id="cookieShadow" class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/3 group-hover:translate-y-full w-60 h-5 rounded-[100%_100%] blur-lg bg-black/60 group-hover:bg-black transition-all"></div>
      </div>
    </main>
    <aside class="flex flex-col item min-w-50 h-fit m-4 rounded-2xl border-2 border-teal-700/60 hover:border-teal-700 bg-teal-700 hover:shadow-3xl transition-all">
      <h2 class="text-2xl text-center text-white p-4">ขอใช้ตัวช่วย!</h2>
      <ul class="flex flex-col gap-4 p-4 rounded-2xl bg-white">
        <li><button id="clickerOptionAuntNextDoor" class="group cursor-pointer relative w-full text-slate-700 hover:text-white px-4 pt-0.5 pb-2 rounded-lg bg-slate-100 hover:bg-teal-600 transition-all">
          คุณป้าข้างบ้าน<br>
          <strong class="inline-flex items-center gap-1 text-xs group-hover:text-teal-700 px-2 py-1 rounded bg-white">+ 3 / วิ <img class="inline size-3 align-middle" src="./images/cookie.svg"></strong>
          <span class="hidden absolute top-1/2 -left-[7px] -translate-y-1/2 size-4 text-xs font-bold text-teal-700 border border-teal-700 rounded-full bg-white">&#10003;</span>
        </button></li>
        <li><button id="clickerOptionAerobicsSociety" class="group cursor-pointer relative w-full text-slate-700 hover:text-white px-4 pt-0.5 pb-2 rounded-lg bg-slate-100 hover:bg-teal-600 transition-all">
          ชมรมแอโรบิก<br>
          <strong class="inline-flex items-center gap-1 text-xs group-hover:text-teal-700 px-2 py-1 rounded bg-white">x 4 / วิ <img class="inline size-3 align-middle" src="./images/cookie.svg"></strong>
          <span class="hidden absolute top-1/2 -left-[7px] -translate-y-1/2 size-4 text-xs font-bold text-teal-700 border border-teal-700 rounded-full bg-white">&#10003;</span>
        </button></li>
      </ul>
    </aside>
  </body>
</html>
