<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poke API</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-4">
    <div class="relative w-80 py-4 mx-auto">
      <input id="pokeId" class="w-full p-4 border-1 border-slate-300 hover:border-slate-500 outline-none rounded-lg transition-all" type="number" placeholder="Enter number id" max="1025">
      <button id="findPoke" class="absolute top-1/2 right-2 -translate-y-1/2 text-white p-2 rounded bg-slate-400 hover:bg-slate-500 transition-all">Find</button>
    </div>
    <div id="pokeContainer" class="flex flex-wrap justify-center gap-4 p-4"></div>
    <script>
      const pokeContainer = document.getElementById("pokeContainer");
      //const pokeId = document.getElementById("pokeId");
      const findPokeBtn = document.getElementById("findPoke");
      findPokeBtn.addEventListener("click", () => {
        const randomId = Math.floor(Math.random() * 1025) + 1; // 1025
        fetch(`https://pokeapi.co/api/v2/pokemon/${pokeId.value ? pokeId.value : randomId}`)
          .then((response) => {
            return response.json();
          })
          .then((data) => {
            const div = document.createElement("div");
            div.className =`itemlist w-40 relative`;
            pokeContainer.prepend(div);

            const h1  = document.createElement("h1");
            h1.className =`text-lg capitalize text-center`;
            h1.innerText = data.name;
            document.querySelector(".itemlist").prepend(h1);

            const img = document.createElement("img");
            img.className =`size-40 rounded-lg bg-slate-100`;
            img.src = data.sprites.front_default;
            document.querySelector(".itemlist").prepend(img);

            const closeBtn = document.createElement("button");
            closeBtn.className =`absolute top-2 right-2 bg-white hover:bg-red-100 text-red-600 px-2 rounded`;
            closeBtn.innerText = "X";
            document.querySelector(".itemlist").prepend(closeBtn);
            closeBtn.addEventListener("click", () => {
              div.remove();
            });
          })
          .catch((error) => {
            console.error("Something went wrong!", error);
          });
        document.getElementById("pokeId").value = "";
      });
    </script>
  </body>
</html>
