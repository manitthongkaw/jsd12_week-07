<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Change text form input</h1>
    <p id="showText"></p>
    <input id="inputText" type="text" oninput="output()">
    <script>
      const showText = document.getElementById("showText");
      const inputValue = document.getElementById("inputText");
      const output = () => showText.innerText = inputValue.value;
    </script>
  </body>
</html>
